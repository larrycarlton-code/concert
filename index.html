<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Midnight Latin Trip — Jiyoup Kim Quartet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=EB+Garamond:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#171719;
    --ink-2:#1e1e21;
    --paper:#e9e6df;
    --paper-dim:#b9b5ad;
    --line:rgba(233,230,223,.16);
    --gap:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:#0d0d0e;
    color:var(--paper);
    font-family:"Noto Sans KR",system-ui,sans-serif;
    display:flex;
    justify-content:center;
    padding:32px 16px;
    min-height:100vh;
  }

  .poster{
    position:relative;
    width:min(700px,100%);
    aspect-ratio:700/944;
    padding:38px 26px 26px;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(120% 80% at 50% 0%, #232326 0%, transparent 60%),
      radial-gradient(90% 60% at 50% 100%, #1b1b1e 0%, transparent 70%),
      var(--ink);
    overflow:hidden;
    isolation:isolate;
  }
  /* 종이 질감 */
  .poster::before{
    content:"";
    position:absolute; inset:0; z-index:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.022) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 1px, transparent 1px 4px);
    mix-blend-mode:overlay;
    pointer-events:none;
  }
  .poster > *{position:relative; z-index:1}

  /* ── 타이틀 ── */
  .masthead{text-align:center; margin-bottom:26px}
  .title{
    font-family:"Cormorant Garamond",Garamond,serif;
    font-weight:300;
    font-size:clamp(34px,6.6vw,58px);
    letter-spacing:.005em;
    line-height:1.05;
  }
  .subtitle{
    font-family:"EB Garamond","Cormorant Garamond",serif;
    font-weight:500;
    font-size:clamp(19px,3.5vw,31px);
    letter-spacing:.01em;
    margin-top:.42em;
  }

  /* ── 인물 4분할 ── */
  .portraits{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:var(--gap);
    aspect-ratio:664/486;
  }
  .portrait{
    position:relative;
    overflow:hidden;
    background:#0a0a0b;
  }
  .portrait img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    filter:saturate(.86) contrast(1.04);
    transition:transform .9s cubic-bezier(.2,.7,.2,1), filter .6s ease;
  }
  .portrait::after{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(180deg,rgba(13,13,14,.55) 0%,transparent 22%,transparent 74%,rgba(13,13,14,.6) 100%);
    pointer-events:none;
  }
  .portrait .role{
    position:absolute; left:0; right:0; bottom:10px; z-index:2;
    text-align:center;
    font-size:11px; font-weight:300; letter-spacing:.16em;
    color:var(--paper);
    text-transform:uppercase;
    opacity:0; transform:translateY(6px);
    transition:opacity .45s ease, transform .45s ease;
    text-shadow:0 1px 8px rgba(0,0,0,.9);
  }
  .portrait:hover img,.portrait:focus-visible img{transform:scale(1.05); filter:saturate(1) contrast(1.08)}
  .portrait:hover .role,.portrait:focus-visible .role{opacity:1; transform:none}
  .portrait:focus-visible{outline:1px solid var(--paper-dim); outline-offset:2px}

  /* ── 곡목 ── */
  .setlist{
    margin:26px auto 0;
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    column-gap:clamp(24px,9vw,74px);
    row-gap:.34em;
    width:fit-content;
    font-family:"EB Garamond","Cormorant Garamond",serif;
    font-size:clamp(15px,2.7vw,23px);
    font-weight:400;
    line-height:1.32;
    letter-spacing:.005em;
  }
  .setlist li{list-style:none}

  /* ── 정보 ── */
  .info{margin-top:auto; padding-top:20px}
  .info hr{border:0; border-top:1px solid var(--line)}
  .primary{
    display:flex; flex-wrap:wrap; justify-content:center;
    gap:10px clamp(20px,7vw,56px);
    padding:14px 0 13px;
    font-size:clamp(12px,2.1vw,17px);
    font-weight:400;
    letter-spacing:.01em;
  }
  .credits{
    display:flex; flex-wrap:wrap; justify-content:space-between;
    gap:8px 18px;
    padding-top:13px;
    font-size:clamp(10px,1.6vw,12.5px);
    font-weight:600;
    color:var(--paper-dim);
    letter-spacing:.02em;
  }
  .item{display:inline-flex; align-items:center; gap:7px; white-space:nowrap}
  .item svg{flex:none; opacity:.75}
  .mark{
    position:absolute; right:22px; bottom:16px; z-index:2;
    width:16px; height:16px; opacity:.85;
  }

  /* ── 등장 연출 ── */
  .reveal{opacity:0; transform:translateY(14px); transition:opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1; transform:none}
  .portrait.reveal{transform:translateY(22px)}

  @media (max-width:560px){
    body{padding:14px 8px}
    .poster{padding:24px 14px 16px; aspect-ratio:auto}
    .portraits{aspect-ratio:664/560}
    .setlist{margin-top:20px}
    .credits{justify-content:center; text-align:center}
    .info{margin-top:22px}
  }
  @media (prefers-reduced-motion:reduce){
    .reveal{opacity:1; transform:none; transition:none}
    .portrait img{transition:none}
  }
</style>
</head>

<script>
(function () {
  "use strict";

  /* 곡목 — 포스터와 같은 세로 읽기 순서(왼쪽 열 → 오른쪽 열) */
  var SETLIST = [
    "All the things you are",
    "Black orpheus",
    "How insensitive",
    "Aguas de marco",
    "One note samba",
    "Vera cruz",
    "Spain",
    "Blue bossa"
  ];

  var list = document.getElementById("setlist");
  var half = Math.ceil(SETLIST.length / 2);
  SETLIST.forEach(function (song, i) {
    var li = document.createElement("li");
    li.textContent = song;
    li.className = "reveal";
    /* CSS grid는 행 우선이므로 두 열로 나눠 배치 */
    li.style.gridColumn = i < half ? "1" : "2";
    li.style.gridRow = String((i % half) + 1);
    list.appendChild(li);
  });

  /* 순차 등장 */
  var items = document.querySelectorAll(".reveal");
  var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function show(el, delay) {
    if (reduce) { el.classList.add("in"); return; }
    setTimeout(function () { el.classList.add("in"); }, delay);
  }

  if (!("IntersectionObserver" in window)) {
    items.forEach(function (el) { el.classList.add("in"); });
    return;
  }

  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (!entry.isIntersecting) return;
      var siblings = Array.prototype.slice.call(items);
      show(entry.target, siblings.indexOf(entry.target) * 90);
      io.unobserve(entry.target);
    });
  }, { threshold: 0.12 });

  items.forEach(function (el) { io.observe(el); });
})();
</script>
