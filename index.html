<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Midnight Latin Trip — Ji youb Kim Quartet</title>
<meta name="description" content="2026년 7월 23일(목) 7:30 PM · 청주 예술의 전당 소극장">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=EB+Garamond:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   원본 포스터 707 × 941 px 를 좌표계로 삼아 모든 위치·크기를
   % 로 환산했다. 글자 크기는 JS 오토핏으로 "원본에서 글자가
   차지하던 가로 폭" 에 맞춰 계산하므로, 화면 폭이 320px이든
   1200px이든 포스터와 완전히 같은 비율로 축소·확대된다.
   ══════════════════════════════════════════════════════════ */
:root{
  --white:#fcfbfb;
  --sub:#ede9ee;
  --song:#cbc9cb;
  --date:#c6c5c7;
  --cred:#b6b1b0;
  --rule:rgba(220,226,229,.40);
  --hair:rgba(210,216,220,.30);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:#0b0d0e;
  min-height:100vh;
  min-height:100dvh;              /* 모바일 주소창 높이 변화 대응 */
  padding:28px 16px;
  display:flex;                   /* 자식 margin:auto 로 상하좌우 정중앙 */
  font-family:"Noto Sans KR",system-ui,sans-serif;
}

.poster{
  position:relative;
  width:707px; max-width:100%;
  width:min(707px,100%);
  margin:auto;                     /* 넘칠 때도 잘리지 않는 안전한 가운데 정렬 */
  aspect-ratio:707 / 963;
  container-type:inline-size;
  overflow:hidden;
  color:var(--white);
  background:
    radial-gradient(76% 40% at 50% 5%,  #2b3135 0%, rgba(43,49,53,0) 62%),
    radial-gradient(68% 32% at 50% 97%, #242b2e 0%, rgba(36,43,46,0) 70%),
    linear-gradient(180deg,#191d21 0%,#1e2428 46%,#171b1e 100%);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
}
.poster::before{                   /* 707:963 비율 유지 (구형 브라우저까지) */
  content:""; display:block; padding-top:136.2093%;
}
.poster::after{                    /* 종이 결 */
  content:""; position:absolute; inset:0; z-index:6; pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px),
    repeating-linear-gradient(90deg,rgba(0,0,0,.05) 0 1px,transparent 1px 4px);
  mix-blend-mode:overlay;
}

/* 가로 한 줄짜리 요소의 공통 규칙 : 세로 중심 기준 + 줄바꿈 금지 */
.row{position:absolute; left:0; right:0; transform:translateY(-50%);
     white-space:nowrap; line-height:1; text-align:center}

/* ── 타이틀 ───────────────────────────────── */
.title{
  top:6.64%;
  font-family:"Cormorant Garamond","EB Garamond",Garamond,serif;
  font-weight:300; letter-spacing:.004em; color:var(--white);
  text-shadow:0 0 .42em rgba(226,232,236,.30);
}
.subtitle{
  top:13.24%;
  font-family:"EB Garamond","Cormorant Garamond",Garamond,serif;
  font-weight:500; letter-spacing:.008em; color:var(--sub);
  text-shadow:0 0 .38em rgba(226,232,236,.22);
}

/* ── 인물 4분할 ───────────────────────────── */
.strip{
  position:absolute; left:1.70%; width:96.60%; top:18.80%; height:49.95%;
  z-index:7;                       /* 종이 결(::after, z-index:6) 위 → 사진은 원본 그대로 */
  display:grid; grid-template-columns:repeat(4,1fr); column-gap:.879%;
}
.panel{position:relative; overflow:hidden; background:#0a0c0d}
.panel img{
  width:100%; height:100%; object-fit:cover; display:block;
  transition:transform .9s cubic-bezier(.2,.7,.2,1), filter .6s ease;
}
.panel figcaption{
  position:absolute; left:0; right:0; bottom:3.5%; z-index:2; text-align:center;
  font-size:11px; font-size:1.55cqw; font-weight:300; letter-spacing:.18em; text-transform:uppercase;
  color:#e8e4de; opacity:0; transform:translateY(35%);
  transition:opacity .4s ease, transform .4s ease;
  text-shadow:0 1px 10px rgba(0,0,0,.95);
}
.panel:hover img,.panel:focus-visible img{transform:scale(1.045); filter:brightness(1.07)}
.panel:hover figcaption,.panel:focus-visible figcaption{opacity:1; transform:none}
.panel:focus-visible{outline:1px solid rgba(255,255,255,.55); outline-offset:-1px}

/* ── 곡목 2단 ─────────────────────────────── */
.songs{position:absolute; left:0; right:0; top:76.18%; transform:translateY(-50%)}
.songs .col{
  position:absolute; top:0; white-space:nowrap;
  font-family:"EB Garamond","Cormorant Garamond",serif; font-weight:400;
  color:var(--song); letter-spacing:.004em;
}
.songs .col--l{left:19.94%}
.songs .col--r{left:58.98%}
.songs li{list-style:none}

/* ── 구분선 ───────────────────────────────── */
.rule{position:absolute; left:4.38%; width:91.23%; height:1px;
      background:var(--rule); transform:translateY(-50%)}
.rule--1{top:84.94%}
.rule--2{top:89.77%}

/* ── 일시 · 장소 ──────────────────────────── */
.date{top:87.43%; color:var(--date); font-weight:400}
.date .fit{display:inline-flex; align-items:center}
.date .item{display:inline-flex; align-items:center; gap:.60em}
.date .item + .item{margin-left:1.85em}
.date svg{width:1.02em; height:1.02em; flex:none; opacity:.82}

/* ── 크레딧 ───────────────────────────────── */
.credits{top:92.10%; left:4.38%; right:4.38%;
  display:flex; justify-content:space-between; align-items:center;
  color:var(--cred); font-weight:700; text-align:left}
.credits .item{display:inline-flex; align-items:center; gap:.50em; white-space:nowrap}
.credits svg{width:1.02em; height:1.02em; flex:none; opacity:.82; stroke-width:1.9}

/* 링크(문의 · 장소) 공통 : 포스터 톤을 해치지 않는 최소 표시 */
.credits a.item,.date a.item{color:inherit; text-decoration:none;
  transition:color .3s ease}
.credits a.item:hover,.credits a.item:focus-visible,
.date a.item:hover,.date a.item:focus-visible{color:var(--white)}
.credits a.item:hover svg,.date a.item:hover svg{opacity:1}
.credits a.item:focus-visible,.date a.item:focus-visible{
  outline:1px solid rgba(255,255,255,.5); outline-offset:3px}

/* ── 하단 스파클 : 글자와 겹치지 않는 독립 라인 ── */
.finale{
  position:absolute; left:4.53%; right:3.40%; top:96.21%;
  transform:translateY(-50%);
  display:flex; align-items:center;
}
.finale .line{height:1px; background:var(--hair)}
.finale .line--l{flex:1 1 auto}
.finale .line--r{flex:none; width:41.3%}
.finale .spark{flex:none; display:block; color:#eceff1}
.finale .spark--sm{width:2.76%; margin:0 2.92% 0 2.76%; opacity:.9}
.finale .spark--lg{width:4.30%; margin-left:.77%; opacity:.95;
  filter:drop-shadow(0 0 5px rgba(236,239,241,.5))}

/* ── 등장 연출 (레이아웃에 영향 없는 opacity 만) ── */
.fade{opacity:0}
.poster.ready .fade{opacity:1; transition:opacity 1s ease var(--d,0s)}

@media (max-width:640px){ body{padding:0} .poster{box-shadow:none} }
@media (prefers-reduced-motion:reduce){
  .fade{opacity:1; transition:none}
  .panel img{transition:none}
}

/* ══════════════════════════════════════════════════════════
   멤버 소개 모달 (포스터 레이아웃에는 전혀 영향 없음)
   ══════════════════════════════════════════════════════════ */
:root{
  --gold:#c9a86a;
  --gold-soft:rgba(201,168,106,.45);
  --gold-faint:rgba(201,168,106,.18);
}
.panel{cursor:pointer}

.mm{position:fixed; inset:0; z-index:100; display:flex;
    align-items:center; justify-content:center; padding:24px 16px;
    overflow-y:auto; -webkit-overflow-scrolling:touch}
.mm[hidden]{display:none}
.mm__backdrop{position:fixed; inset:0; background:rgba(6,8,9,.86);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px)}

.mm__card{
  position:relative; z-index:1;
  width:min(560px,100%); margin:auto;
  padding:clamp(26px,5vw,38px) clamp(22px,5vw,40px) clamp(20px,4vw,28px);
  background:linear-gradient(160deg,#1d2225 0%,#15191b 100%);
  border:1px solid var(--gold-faint);
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  color:#e6e2dc;
  animation:mmIn .38s cubic-bezier(.2,.7,.2,1);
}
@keyframes mmIn{from{opacity:0; transform:translateY(14px)}to{opacity:1;transform:none}}
/* 모서리 장식 */
.mm__card::before,.mm__card::after{
  content:""; position:absolute; width:26px; height:26px; pointer-events:none;
  border:1px solid var(--gold-soft);
}
.mm__card::before{top:10px; left:10px; border-right:0; border-bottom:0}
.mm__card::after{bottom:10px; right:10px; border-left:0; border-top:0}

.mm__close{
  position:absolute; top:10px; right:14px; z-index:2;
  background:none; border:0; color:#9a958e; font-size:26px; line-height:1;
  cursor:pointer; padding:6px; transition:color .2s;
}
.mm__close:hover,.mm__close:focus-visible{color:var(--gold)}

.mm__head{display:flex; align-items:center; gap:clamp(14px,3vw,20px); margin-bottom:20px}
.mm__ring{
  flex:none; width:clamp(66px,15vw,84px); aspect-ratio:1; border-radius:50%;
  padding:2px; background:linear-gradient(150deg,var(--gold),rgba(201,168,106,.15));
  display:block;
}
.mm__ring img{width:100%; height:100%; border-radius:50%; object-fit:cover;
  object-position:50% 22%; display:block; background:#0d1011}
.mm__role{
  font-family:"EB Garamond",serif; font-weight:500;
  font-size:clamp(13px,2.6vw,15px); letter-spacing:.14em; text-transform:uppercase;
  color:var(--gold); margin-bottom:.25em;
}
.mm__name{font-size:clamp(19px,4vw,24px); font-weight:500; letter-spacing:-.01em; color:#f2eee8}

.mm__list{list-style:none; margin:0; padding:0; border-top:1px solid var(--gold-faint); padding-top:18px}
.mm__list li{
  position:relative; padding-left:18px; margin-bottom:.62em;
  font-size:clamp(13px,2.8vw,14.5px); font-weight:300; line-height:1.7; color:#cdc8c1;
}
.mm__list li::before{
  content:""; position:absolute; left:2px; top:.68em; width:5px; height:5px;
  background:var(--gold); transform:rotate(45deg); opacity:.85;
}

.mm__nav{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  margin-top:22px; padding-top:16px; border-top:1px solid var(--gold-faint);
}
.mm__nav button{
  background:none; border:0; cursor:pointer; padding:6px 2px;
  color:#a9a49d; font-family:inherit; font-size:12.5px; font-weight:400;
  letter-spacing:.02em; transition:color .2s;
}
.mm__nav button:hover,.mm__nav button:focus-visible{color:var(--gold)}
.mm__mark{
  font-family:"EB Garamond",serif; font-size:11px; letter-spacing:.22em;
  color:var(--gold); opacity:.75; white-space:nowrap;
}
body.mm-open{overflow:hidden}

/* ── 곡목 클릭 → 곡 해설 모달 ─────────────── */
.songs li{cursor:pointer; transition:color .25s ease, opacity .25s ease}
.songs li:hover,.songs li:focus-visible{color:var(--white)}
.songs li:focus-visible{outline:1px solid rgba(255,255,255,.45); outline-offset:2px}

#smMeta{text-transform:none; letter-spacing:.06em; font-size:clamp(12.5px,2.5vw,14px)}
.sm__title{
  font-family:"EB Garamond","Cormorant Garamond",serif;
  font-size:clamp(21px,4.4vw,27px); font-weight:500; letter-spacing:.005em;
  color:#f2eee8; line-height:1.25;
}
.sm__desc{
  margin-top:18px; padding-top:18px; border-top:1px solid var(--gold-faint);
  font-size:clamp(13px,2.8vw,14.5px); font-weight:300; line-height:1.85; color:#cdc8c1;
}

@media (max-width:420px){
  .mm__mark{display:none}
  .mm__nav{justify-content:space-between}
}
@media (prefers-reduced-motion:reduce){
  .mm__card{animation:none}
}

</style>
</head>

      desc:  "안토니우 카를루스 조빙(Antônio Carlos Jobim)이 작곡하고 비니시우스 지 모라이스(Vinicius de Moraes)가 가사를 붙인 보사노바의 대표작입니다. 절제된 선율과 섬세한 화성, 담담하면서도 깊은 정서가 어우러져 조빙 특유의 음악 세계를 잘 보여줍니다. 재즈 연주자들에게도 널리 사랑받으며 다양한 해석으로 꾸준히 연주되는 브라질 음악의 명곡입니다."

      desc:  "케니 더햄(Kenny Dorham)이 작곡한 곡으로, 1963년 조 헨더슨의 앨범 《Page One》에 처음 수록되었습니다. 보사노바 리듬에 블루스 감각과 재즈 화성을 결합한 간결한 구성이 특징이며, 선율이 명확하고 즉흥연주의 여지가 넓어 잼 세션에서 자주 연주되는 스탠더드입니다."
    }
  ];

  var cols = poster.querySelectorAll(".songs .col");
  SETLIST.forEach(function (song, i) {
    var li = document.createElement("li");
    li.textContent = song.title;
    li.setAttribute("role", "button");
    li.setAttribute("tabindex", "0");
    li.setAttribute("aria-label", song.title + " 곡 해설 보기");
    li.dataset.song = i;
    cols[i < 4 ? 0 : 1].appendChild(li);
  });
  window.__SETLIST = SETLIST;

  /* ── 원본 포스터 실측값 (707 × 963) ──
     w : 그 글자 덩어리가 포스터 가로폭에서 차지하던 비율 */
  var FIT = [
    { measure: "#title .fit",    w: 433 / 707 },
    { measure: "#subtitle .fit", w: 308 / 707 },
    { measure: "#date .fit",     w: 583 / 707, apply: "#date" },
    { measure: "#credits .item:first-child .txt", w: 164 / 707, apply: "#credits" }
  ];
  var SONG_W     = 197 / 707;   /* 가장 긴 곡목 "All the things you are" */
  var SONG_PITCH = 27.4 / 963;  /* 곡목 줄 간격 */
  var SONG_LINES = 4;

  /* 100px 로 재고 목표 폭을 역산 → 어떤 폰트가 로드돼도 비율 유지 */
  function fitTo(measureEl, applyEl, ratio, W) {
    if (!measureEl || !applyEl) return;
    applyEl.style.fontSize = "100px";
    var w = measureEl.getBoundingClientRect().width;
    if (!w) return;
    applyEl.style.fontSize = (100 * (W * ratio) / w) + "px";
  }

  function layout() {
    var W = poster.clientWidth;
    var H = poster.clientHeight;
    if (!W || !H) return;

    FIT.forEach(function (f) {
      var m = poster.querySelector(f.measure);
      var a = f.apply ? poster.querySelector(f.apply) : m;
      fitTo(m, a, f.w, W);
    });

    var songs = poster.querySelector(".songs");
    var pitch = H * SONG_PITCH;
    fitTo(poster.querySelector(".songs .col--l"), songs, SONG_W, W);
    songs.style.lineHeight = pitch + "px";
    songs.style.height = (pitch * SONG_LINES) + "px";

    poster.classList.add("ready");
  }

  layout();
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(layout);
  window.addEventListener("load", layout);

  if ("ResizeObserver" in window) {
    new ResizeObserver(layout).observe(poster);
  } else {
    window.addEventListener("resize", layout);
    window.addEventListener("orientationchange", layout);
  }
})();
</script>

<script>
(function () {
  "use strict";

  /* ══════════════════════════════════════════════════════
     멤버 정보 — 여기만 고치면 소개 내용이 바뀝니다.
     순서는 포스터 사진 순서(왼쪽→오른쪽)와 같아야 합니다.
     ══════════════════════════════════════════════════════ */
  var MEMBERS = [
    {
      role: "Guitar",
      name: "이동혁",
      items: [
        "2023년 클럽 그루브 〈Go! Latin Concert〉",
        "2023년 제주 카페무이 〈여름의 제주, 그리고 보사노바〉",
        "2023년 제주 재즈클럽 마일스 〈Jazz & Bossa Meets Cello〉",
        "2022년 국립세종수목원 〈여름꽃 축제〉 콘서트",
        "2022년 대학로 드림시어터 연극 〈3일만 볼 수 있다면〉"
      ]
    },
    {
      role: "Bass",
      name: "장푸른하늘",
      items: [
        "한양대학교 대학원 재즈연주학과 졸업",
        "2023년 9월 〈웹툰클래식 피아노포르테〉 베이스 연주",
        "2023년 10월 육군종합행정학교 〈재즈토크콘서트〉",
        "2024년 5월 청남대 재즈토닉 〈김정장 트리오〉",
        "2025년 11월 소리나눔퓨전 콘서트"
      ]
    },
    {
      role: "Piano",
      name: "김지엽",
      items: [
        "Berklee College of Music 재즈피아노과 학사 졸업",
        "이화여자대학교 공연예술대학원 음악공학과 석사 졸업",
        "(전) 충청대학교, 충북보건대학교 실용음악과 외래교수",
        "(전) 세한대학교 뮤지컬과 앙상블 외래교수",
        "1집·4집 앨범발매 〈작곡, 피아노, 프로듀싱〉"
      ]
    },
    {
      role: "Drum",
      name: "김영삼",
      items: [
        "(전) 충청대 K-Culture과 조교수",
        "미국, 〈농심 USA 신라면 광고〉 음악감독",
        "미국, 〈Ken Song Jazz 밴드〉 Drum",
        "미국, 〈Yoonseung Cho 트리오〉 Drum",
        "미국, 〈버클리 퍼포먼스 센터 실연〉 Percussion"
      ]
    }
  ];

  var modal   = document.getElementById("memberModal");
  var elPhoto = document.getElementById("mmPhoto");
  var elRole  = document.getElementById("mmRole");
  var elName  = document.getElementById("mmName");
  var elList  = document.getElementById("mmList");
  var closeBtn = modal.querySelector(".mm__close");
  var panels  = document.querySelectorAll(".poster .panel");
  var current = 0;
  var lastFocus = null;

  function render(i) {
    var m = MEMBERS[i];
    if (!m) return;
    current = i;

    var img = panels[i] ? panels[i].querySelector("img") : null;
    if (img) {
      elPhoto.src = img.src;
      elPhoto.alt = m.name + " " + m.role;
    }
    elRole.textContent = m.role;
    elName.textContent = m.name;

    elList.innerHTML = "";
    m.items.forEach(function (text) {
      var li = document.createElement("li");
      li.textContent = text;
      elList.appendChild(li);
    });
  }

  function open(i) {
    lastFocus = document.activeElement;
    render(i);
    modal.hidden = false;
    document.body.classList.add("mm-open");
    closeBtn.focus();
  }

  function close() {
    modal.hidden = true;
    document.body.classList.remove("mm-open");
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  }

  function step(dir) {
    render((current + dir + MEMBERS.length) % MEMBERS.length);
  }

  /* 사진 클릭 / 키보드 */
  panels.forEach(function (panel, i) {
    panel.setAttribute("role", "button");
    if (MEMBERS[i]) {
      panel.setAttribute("aria-label", MEMBERS[i].name + " " + MEMBERS[i].role + " 소개 보기");
    }
    panel.addEventListener("click", function () { open(i); });
    panel.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
        e.preventDefault();
        open(i);
      }
    });
  });

  /* 닫기 · 이동 */
  modal.addEventListener("click", function (e) {
    if (e.target.closest("[data-mm-close]")) { close(); return; }
    var nav = e.target.closest("[data-mm-nav]");
    if (nav) step(parseInt(nav.getAttribute("data-mm-nav"), 10));
  });

  document.addEventListener("keydown", function (e) {
    if (modal.hidden) return;
    if (e.key === "Escape") close();
    else if (e.key === "ArrowRight") step(1);
    else if (e.key === "ArrowLeft") step(-1);
  });
})();
</script>

<script>
/* ── 곡 해설 모달 ── */
(function () {
  "use strict";

  var SONGS   = window.__SETLIST || [];
  var modal   = document.getElementById("songModal");
  var elMeta  = document.getElementById("smMeta");
  var elTitle = document.getElementById("smTitle");
  var elDesc  = document.getElementById("smDesc");
  var closeBtn = modal.querySelector(".mm__close");
  var current = 0;
  var lastFocus = null;

  function render(i) {
    var s = SONGS[i];
    if (!s) return;
    current = i;
    elMeta.textContent  = s.meta;
    elTitle.textContent = s.title;
    elDesc.textContent  = s.desc;
  }

  function open(i) {
    lastFocus = document.activeElement;
    render(i);
    modal.hidden = false;
    document.body.classList.add("mm-open");
    closeBtn.focus();
  }

  function close() {
    modal.hidden = true;
    document.body.classList.remove("mm-open");
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  }

  function step(dir) {
    render((current + dir + SONGS.length) % SONGS.length);
  }

  /* 곡목 클릭 / 키보드 (이벤트 위임) */
  var songs = document.querySelector(".songs");
  songs.addEventListener("click", function (e) {
    var li = e.target.closest("li[data-song]");
    if (li) open(parseInt(li.dataset.song, 10));
  });
  songs.addEventListener("keydown", function (e) {
    if (e.key !== "Enter" && e.key !== " " && e.key !== "Spacebar") return;
    var li = e.target.closest("li[data-song]");
    if (li) { e.preventDefault(); open(parseInt(li.dataset.song, 10)); }
  });

  /* 닫기 · 이동 */
  modal.addEventListener("click", function (e) {
    if (e.target.closest("[data-sm-close]")) { close(); return; }
    var nav = e.target.closest("[data-sm-nav]");
    if (nav) step(parseInt(nav.getAttribute("data-sm-nav"), 10));
  });

  document.addEventListener("keydown", function (e) {
    if (modal.hidden) return;
    if (e.key === "Escape") close();
    else if (e.key === "ArrowRight") step(1);
    else if (e.key === "ArrowLeft") step(-1);
  });
})();
</script>
